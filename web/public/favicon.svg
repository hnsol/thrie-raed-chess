<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Thrie Raed Chess">
  <!-- ナイト+3択カラー(Flexoki)のロゴ。台座/駒色は prefers-color-scheme で切替。
       ナイトの形状は cburnett 駒セット(GPLv2+, lichess-org/lila)由来のシルエット。 -->
  <style>
    .pedestal { fill: #F2F0E5; }           /* flexoki base-50 */
    .knight { fill: #100F0F; stroke: #100F0F; } /* flexoki black */
    .carve { fill: #F2F0E5; }
    @media (prefers-color-scheme: dark) {
      .pedestal { fill: #282726; }         /* flexoki base-900 */
      .knight { fill: #CECDC3; stroke: #CECDC3; } /* flexoki base-200 */
      .carve { fill: #282726; }
    }
  </style>
  <rect class="pedestal" x="16" y="16" width="480" height="480" rx="112"/>
  <g transform="translate(76 44) scale(8)">
    <g stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path class="knight" d="M22 10c10.5 1 16.5 8 16 29H15c0-9 10-6.5 8-21"/>
      <path class="knight" d="M24 18c.38 2.91-5.55 7.37-8 9-3 2-2.82 4.34-5 4-1.042-.94 1.41-3.04 0-3-1 0 .19 1.23-1 2-1 0-4.003 1-4-4 0-2 6-12 6-12s1.89-1.9 2-3.5c-.73-.994-.5-2-.5-3 1-1 3 2.5 3 2.5h2s.78-1.992 2.5-3c1 0 1 3 1 3"/>
      <path class="carve" stroke="none" d="M9.5 25.5a.5.5 0 1 1-1 0 .5.5 0 1 1 1 0m5.433-9.75a.5 1.5 30 1 1-.866-.5.5 1.5 30 1 1 .866.5"/>
    </g>
  </g>
  <circle cx="166" cy="428" r="26" fill="#3AA99F"/>
  <circle cx="256" cy="428" r="26" fill="#CE5D97"/>
  <circle cx="346" cy="428" r="26" fill="#8B7EC8"/>
</svg>
